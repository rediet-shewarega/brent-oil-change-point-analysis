name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn statsmodels scipy pytest

      - name: Check important imports
        run: |
          python -c "import pandas, numpy, matplotlib, seaborn, statsmodels; print('Imports successful')"

      - name: Run tests if available
        run: |
          pytest tests || echo "No tests found yet"
